# CI/CD — test (F6) → build once → deploy production (single server)
#
# ทำไมรวม build/deploy ไว้ในไฟล์เดียวกับ test (ไม่แยก deploy.yml):
#   GitHub Actions `needs:` อ้าง job ได้เฉพาะ "ในไฟล์ workflow เดียวกัน" เท่านั้น
#   การแยกไฟล์ต้องใช้ `workflow_run` (คนละกลไก, ไม่ใช่ needs:) และ gate ได้อ่อนกว่า
#   → รวมไฟล์เดียวเพื่อให้ build/deploy `needs: test` จริง และ deploy-production
#     ใช้ GitHub Environment (required reviewer) เป็น manual-approval gate
#
# sit/uat ไม่ได้ wire เข้า pipeline นี้ (docker-compose.sit.yml/uat.yml + deploy.sh
# ยังรองรับอยู่เผื่อใช้ทีหลัง) เพราะตอนนี้มี target server จริงแค่ตัวเดียว (production)
name: CI/CD

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # ---------- F6: test (postgres + alembic + pytest + ruff + black) ----------
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: poster_app
          POSTGRES_PASSWORD: poster_pass
          POSTGRES_DB: poster_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # config ที่ settings ต้องมีตอน import (12-Factor: มาจาก environment)
      ENVIRONMENT: sit
      DATABASE_URL: postgresql+asyncpg://poster_app:poster_pass@localhost:5432/poster_db
      JWT_SECRET: ci-dummy-secret-not-a-real-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps (runtime + dev tooling)
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (black)
        run: black --check .
      - name: Migrations smoke (alembic upgrade head)
        run: alembic upgrade head
      - name: Tests (pytest — conftest สร้าง poster_nung_test แยกเอง)
        run: pytest

  # ---------- build once: image tag = git sha, push ghcr.io ----------
  build:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_repo: ${{ steps.image_repo.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute lowercase image repository
        id: image_repo
        # Docker/OCI registry บังคับ repository name เป็นตัวพิมพ์เล็กเท่านั้น แต่
        # github.repository = "Owner/repo" มีตัวพิมพ์ใหญ่ตาม GitHub username จริง
        # (ไม่มี built-in toLower() ใน GitHub Actions expression syntax — ต้องใช้ shell)
        run: echo "value=ghcr.io/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # tag = commit sha → เป็น artifact เดียวที่ promote ข้ามทุก env (build ครั้งเดียว)
          tags: ${{ steps.image_repo.outputs.value }}:${{ github.sha }}

  # ---------- deploy production (image sha เดิมจาก build — ไม่ build ใหม่) ----------
  # environment: production มี required reviewer เป็น gate — ต้องมีคน approve ใน
  # GitHub UI ก่อน step ข้างล่างจะรันจริง (server นี้เป็น live production)
  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read # ให้ docker login ด้านล่าง pull image private ได้
    steps:
      - uses: actions/checkout@v4

      # auth ฝั่ง runner เท่านั้น — docker CLI ส่ง registry auth ไปกับทุกคำสั่ง pull
      # ไม่ว่า daemon ปลายทางจะเป็น local หรือ remote ผ่าน SSH context ก็ตาม
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # runner เป็น ephemeral (VM ใหม่ทุก run) → ต้องสร้าง SSH key + docker context
      # ใหม่ทุกครั้ง ไม่มีอะไร persist ข้าม run
      - name: Set up SSH + docker context to production host
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          {
            echo "Host deploy-target"
            echo "  HostName $DEPLOY_HOST"
            echo "  User $DEPLOY_USER"
            echo "  IdentityFile ~/.ssh/deploy_key"
            echo "  IdentitiesOnly yes"
          } >> ~/.ssh/config
          docker context create posternung-prod --docker "host=ssh://deploy-target"

      # deploy.sh ใช้ `docker compose --env-file .env.production` ซึ่ง resolve ค่าฝั่ง
      # client (= runner นี้) ไม่ใช่ฝั่ง remote daemon — ต้องดึงไฟล์จริงจาก server มา
      # ก่อน (server ยังเป็น source of truth เดียวของ secret นี้ เหมือนเดิม ไม่ duplicate
      # เข้า GitHub secrets)
      - name: Fetch .env.production from target host
        run: scp -F ~/.ssh/config deploy-target:/opt/posternung/.env.production .env.production

      - name: Deploy image sha to PRODUCTION
        env:
          IMAGE_REGISTRY: ${{ needs.build.outputs.image_repo }}
          IMAGE_TAG: ${{ github.sha }}
          DEPLOY_TARGET: posternung-prod
        run: ./.github/scripts/deploy.sh production

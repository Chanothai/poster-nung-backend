# SIT override — docker compose -f docker-compose.yml -f docker-compose.sit.yml --env-file .env.sit up -d
# ต้อง pull image sha ที่ promote มา (ไม่ build ใหม่): เพิ่ม --no-build ตอน deploy
services:
  app:
    container_name: posternung-sit-app
    env_file: !override        # แทนที่ base [.env] ด้วย .env.sit (ไม่ใช่ !reset ที่ลบทิ้ง)
      - .env.sit               # config ของ sit เท่านั้น (DATABASE_URL ชี้ db ของ sit)
  db:
    container_name: posternung-sit-db
    volumes: !override
      - pgdata-sit:/var/lib/postgresql/data

volumes:
  pgdata-sit:

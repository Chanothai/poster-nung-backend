# Base stack (app + db) — deploy ต่อ env ด้วย override file:
#   docker compose -f docker-compose.yml -f docker-compose.<env>.yml --env-file .env.<env> up -d
# local dev รัน DB อย่างเดียวได้: docker compose up -d db  (แล้วรัน uvicorn บน host)
services:
  app:
    build: .
    # IMAGE_TAG=git sha ตอน deploy (build once ที่ CI) / 'local' ตอน dev
    image: ${IMAGE_REGISTRY:-posternung}:${IMAGE_TAG:-local}
    env_file:
      - path: .env          # local dev (optional — ตอน deploy ใช้ override ชี้ .env.<env>)
        required: false
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:${POSTGRES_PORT}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:                              # เช็คว่า DB พร้อมจริงก่อนให้ app เชื่อมต่อ
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
